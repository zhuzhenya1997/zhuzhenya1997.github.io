  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --border: #e5e7eb;
      --ok: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f3f6ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }

    label { font-size: 14px; color: var(--muted); display: block; margin-bottom: 6px; }
    select, input, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
      font-weight: 600;
    }

    button.secondary {
      background: #111827;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .dish {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .dish h4 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.4;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      margin-right: 8px;
    }

    .kcal {
      color: var(--ok);
      font-size: 13px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
    }

    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <h1>家庭菜谱菜单生成器</h1>
    <p class="subtitle">支持按类别筛选、关键词搜索、随机生成菜单，并估算每道菜与总热量（估算值）。</p>

    <section class="card">
      <div class="controls">
        <div>
          <label for="category">分类筛选</label>
          <select id="category"></select>
        </div>
        <div>
          <label for="keyword">关键词</label>
          <input id="keyword" placeholder="例如：鸡、排骨、豆腐" />
        </div>
        <div>
          <label for="menuSize">随机菜单道数</label>
          <select id="menuSize">
            <option value="3">3 道</option>
            <option value="4" selected>4 道</option>
            <option value="5">5 道</option>
            <option value="6">6 道</option>
          </select>
        </div>
        <div>
          <button id="randomBtn">🎲 随机生成菜单</button>
        </div>
        <div>
          <button id="resetBtn" class="secondary">重置筛选</button>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </section>

    <section class="card">
      <h3 style="margin:0 0 8px;">随机菜单</h3>
      <div class="menu-grid" id="menuResult"></div>
      <p class="muted" id="menuHint" style="margin-top:8px;">点击“随机生成菜单”查看推荐。</p>
    </section>

    <section class="card">
      <h3 style="margin:0 0 8px;">菜谱列表</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>菜名</th>
            <th>类别</th>
            <th>热量估算</th>
          </tr>
        </thead>
        <tbody id="dishTable"></tbody>
      </table>
    </section>
  </div>

    const categoryBaseCalories = {
      "荤菜": 520,
      "素菜": 220,
      "主食": 430,
      "汤品": 180,
      "特色小吃": 320,
      "烘焙饮品": 360,
      "凉菜": 160
    };

    function estimateCalories(recipe) {
      let kcal = categoryBaseCalories[recipe.category] ?? 300;
      const name = recipe.name;
      if (/炸|红烧|扣肉|五花|猪蹄|排骨/.test(name)) kcal += 120;
      if (/烤|焖|焗|干锅/.test(name)) kcal += 60;
      if (/鸡胸肉|清炒|白灼|低卡|无油|蔬果/.test(name)) kcal -= 80;
      if (/汤|羹/.test(name)) kcal -= 40;
      return Math.max(90, Math.round(kcal));
    }

    function uniqueCategories(data) {
      return ["全部", ...new Set(data.map(item => item.category))];
    }

    const categoryEl = document.getElementById('category');
    const keywordEl = document.getElementById('keyword');
    const menuSizeEl = document.getElementById('menuSize');
    const dishTable = document.getElementById('dishTable');
    const stats = document.getElementById('stats');
    const menuResult = document.getElementById('menuResult');
    const menuHint = document.getElementById('menuHint');

    function getFilteredRecipes() {
      const cat = categoryEl.value;
      const keyword = keywordEl.value.trim().toLowerCase();
      return recipes.filter(r => {
        const catPass = cat === '全部' || r.category === cat;
        const keyPass = !keyword || r.name.toLowerCase().includes(keyword);
        return catPass && keyPass;
      });
    }

    function renderStats(data) {
      const totalKcal = data.reduce((sum, r) => sum + estimateCalories(r), 0);
      stats.innerHTML = `
        <span>当前匹配 <strong>${data.length}</strong> 道菜</span>
        <span>平均热量 <strong>${data.length ? Math.round(totalKcal / data.length) : 0}</strong> kcal/道</span>
        <span>总菜谱数 <strong>${recipes.length}</strong></span>
      `;
    }

    function renderTable() {
      const data = getFilteredRecipes();
      renderStats(data);
      dishTable.innerHTML = data.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.name}</td>
          <td>${r.category}</td>
          <td>${estimateCalories(r)} kcal</td>
        </tr>
      `).join('');
    }

    function randomPick(arr, n) {
      const pool = [...arr];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, n);
    }

    function renderRandomMenu() {
      const data = getFilteredRecipes();
      const menuSize = Number(menuSizeEl.value);
      const picks = randomPick(data, Math.min(menuSize, data.length));

      if (!picks.length) {
        menuResult.innerHTML = '';
        menuHint.textContent = '当前筛选条件下无菜谱，请调整分类或关键词。';
        return;
      }

      const total = picks.reduce((sum, r) => sum + estimateCalories(r), 0);
      menuResult.innerHTML = picks.map(r => `
        <article class="dish">
          <h4>${r.name}</h4>
          <div><span class="tag">${r.category}</span><span class="kcal">≈ ${estimateCalories(r)} kcal</span></div>
        </article>
      `).join('');
      menuHint.textContent = `本次菜单共 ${picks.length} 道，预估总热量约 ${total} kcal。`;
    }

    function setupCategory() {
      const categories = uniqueCategories(recipes);
      categoryEl.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    document.getElementById('randomBtn').addEventListener('click', renderRandomMenu);
    document.getElementById('resetBtn').addEventListener('click', () => {
      categoryEl.value = '全部';
      keywordEl.value = '';
      menuSizeEl.value = '4';
      renderTable();
      menuResult.innerHTML = '';
      menuHint.textContent = '点击“随机生成菜单”查看推荐。';
    });
    categoryEl.addEventListener('change', renderTable);
    keywordEl.addEventListener('input', renderTable);

    setupCategory();
    renderTable();
  </script>
