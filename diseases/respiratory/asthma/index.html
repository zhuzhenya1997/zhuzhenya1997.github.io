      <h2>疾病简介</h2>
      <p>慢性气道炎症，反复喘息、咳嗽、胸闷。</p>

      <ul><li>说话费力、无法平卧</li><li>缓解药效果差或需频繁使用</li><li>指氧下降、口唇紫绀</li></ul>
    </div>
