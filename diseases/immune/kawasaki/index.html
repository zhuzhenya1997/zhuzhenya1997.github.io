<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>川崎病 - 儿科常用知识库</title>
  <style>
body {font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.65; color:#1f2937; margin:0; background:#f8fafc;}
.container{max-width:860px;margin:0 auto;padding:20px 16px 40px;}
h1{color:#1d4ed8;margin:0 0 8px}
.subtitle{color:#475569;margin:0 0 16px}
h2{color:#334155;border-left:4px solid #60a5fa;padding-left:10px;margin-top:24px}
.card{background:#fff;border:1px solid #dbeafe;border-radius:10px;padding:14px;margin-top:12px}
ul{padding-left:22px;margin:8px 0}
.warning{background:#fff7ed;border-left:4px solid #f97316;padding:12px;color:#7c2d12}
a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="container">
    <p><a href="/">← 返回首页</a></p>
    <h1>川崎病</h1>
    <p class="subtitle">分类：免疫系统疾病</p>

    <div class="card">
      <h2>疾病简介</h2>
      <p>儿童中小血管炎，主要表现为持续发热及黏膜皮肤改变。</p>
    </div>

    <div class="card">
      <h2>家庭护理要点</h2>
      <ul><li>发热超过5天需警惕。</li><li>尽早使用IVIG可减少冠脉并发症。</li><li>按医嘱复查心超。</li></ul>
    </div>

    <div class="card warning">
      <h2>警惕信号（需尽快就医）</h2>
      <ul><li>持续高热</li><li>四肢末端肿胀脱皮</li><li>胸痛或活动后乏力</li></ul>
    </div>

    <div class="card">
      <p>温馨提示：本页仅用于健康教育，不能替代医生面诊与个体化治疗建议。</p>
    </div>
  </div>
</body>
</html>
