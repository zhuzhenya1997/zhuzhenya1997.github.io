  <style>
body {font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.65; color:#1f2937; margin:0; background:#f8fafc;}

.card{background:#fff;border:1px solid #dbeafe;border-radius:10px;padding:14px;margin-top:12px}

<body>
  <div class="container">
    <p><a href="/">← 返回首页</a></p>

    <p class="subtitle">分类：新生儿疾病</p>

    <div class="card">
      <h2>疾病简介</h2>
      <p>全身性感染，进展可迅速恶化。</p>
    </div>

    <div class="card">
      <h2>家庭护理要点</h2>
      <ul><li>出现可疑症状应立即就医。</li><li>规范抗感染和支持治疗。</li><li>重视产前产时感染风险管理。</li></ul>
    </div>

      <h2>警惕信号（需尽快就医）</h2>
      <ul><li>体温不稳</li><li>喂养差伴面色灰白</li><li>呼吸暂停</li></ul>
    </div>

    <div class="card">
      <p>温馨提示：本页仅用于健康教育，不能替代医生面诊与个体化治疗建议。</p>
