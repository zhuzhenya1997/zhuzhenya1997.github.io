<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>不同年龄阶段主要死亡原因及比例分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      PieChart, Pie, Cell, Sector, ComposedChart, Line
    } = Recharts;

    const data = [
      { ageGroup: '0-14岁', deaths: 6.2, deathRatio: 10.7, '新生儿及先天疾病': 50, '感染及寄生虫病': 20, '意外伤害与暴力': 10, '呼吸系统疾病': 8, '恶性肿瘤(癌症)': 5, '心血管疾病': 2, '神经与精神疾病': 0, '其他死因': 5 },
      { ageGroup: '15-29岁', deaths: 2.5, deathRatio: 4.3, '意外伤害与暴力': 50, '神经与精神疾病': 15, '其他死因': 13, '恶性肿瘤(癌症)': 10, '心血管疾病': 5, '感染及寄生虫病': 5, '呼吸系统疾病': 2, '新生儿及先天疾病': 0 },
      { ageGroup: '30-49岁', deaths: 5.8, deathRatio: 10.0, '恶性肿瘤(癌症)': 30, '意外伤害与暴力': 20, '心血管疾病': 20, '其他死因': 10, '感染及寄生虫病': 10, '呼吸系统疾病': 5, '神经与精神疾病': 5, '新生儿及先天疾病': 0 },
      { ageGroup: '50-69岁', deaths: 15.5, deathRatio: 26.8, '恶性肿瘤(癌症)': 40, '心血管疾病': 35, '呼吸系统疾病': 10, '其他死因': 5, '意外伤害与暴力': 5, '感染及寄生虫病': 3, '神经与精神疾病': 2, '新生儿及先天疾病': 0 },
      { ageGroup: '70岁以上', deaths: 27.8, deathRatio: 48.2, '心血管疾病': 45, '恶性肿瘤(癌症)': 20, '呼吸系统疾病': 15, '神经与精神疾病': 10, '感染及寄生虫病': 5, '其他死因': 3, '意外伤害与暴力': 2, '新生儿及先天疾病': 0 },
    ];

    const COLORS = {
      '新生儿及先天疾病': '#f472b6',
      '感染及寄生虫病': '#34d399',
      '意外伤害与暴力': '#fb923c',
      '恶性肿瘤(癌症)': '#ef4444',
      '心血管疾病': '#3b82f6',
      '呼吸系统疾病': '#06b6d4',
      '神经与精神疾病': '#a855f7',
      '其他死因': '#9ca3af',
    };

    const ICONS = {
      '新生儿及先天疾病': '👶',
      '感染及寄生虫病': '🛡️',
      '意外伤害与暴力': '⚠️',
      '恶性肿瘤(癌症)': '🩺',
      '心血管疾病': '❤️',
      '呼吸系统疾病': '🌬️',
      '神经与精神疾病': '🧠',
      '其他死因': '📊'
    };

    const renderActiveShape = (props) => {
      const RADIAN = Math.PI / 180;
      const { cx, cy, midAngle, innerRadius, outerRadius, startAngle, endAngle, fill, payload, value } = props;
      const sin = Math.sin(-RADIAN * midAngle);
      const cos = Math.cos(-RADIAN * midAngle);
      const sx = cx + (outerRadius + 10) * cos;
      const sy = cy + (outerRadius + 10) * sin;
      const mx = cx + (outerRadius + 30) * cos;
      const my = cy + (outerRadius + 30) * sin;
      const ex = mx + (cos >= 0 ? 1 : -1) * 22;
      const ey = my;
      const textAnchor = cos >= 0 ? 'start' : 'end';

      return (
        <g>
          <text x={cx} y={cy} dy={8} textAnchor="middle" fill={fill} className="text-lg font-bold">{payload.name}</text>
          <Sector cx={cx} cy={cy} innerRadius={innerRadius} outerRadius={outerRadius} startAngle={startAngle} endAngle={endAngle} fill={fill} />
          <Sector cx={cx} cy={cy} startAngle={startAngle} endAngle={endAngle} innerRadius={outerRadius + 6} outerRadius={outerRadius + 10} fill={fill} />
          <path d={`M${sx},${sy}L${mx},${my}L${ex},${ey}`} stroke={fill} fill="none" />
          <circle cx={ex} cy={ey} r={2} fill={fill} stroke="none" />
          <text x={ex + (cos >= 0 ? 1 : -1) * 12} y={ey} textAnchor={textAnchor} fill="#333" className="font-semibold">{`${value}%`}</text>
        </g>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('overall');
      const [selectedAgeGroup, setSelectedAgeGroup] = useState(data[0].ageGroup);
      const [pieActiveIndex, setPieActiveIndex] = useState(0);

      const currentPieData = useMemo(() => data.find(d => d.ageGroup === selectedAgeGroup), [selectedAgeGroup]);
      const pieChartData = useMemo(() => Object.keys(currentPieData)
        .filter(key => key !== 'ageGroup' && key !== 'deaths' && key !== 'deathRatio' && currentPieData[key] > 0)
        .map(key => ({ name: key, value: currentPieData[key] }))
        .sort((a, b) => b.value - a.value), [currentPieData]);

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
          <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
            <div className="bg-slate-800 p-6 md:p-8 text-white">
              <h1 className="text-2xl md:text-3xl font-bold mb-2">❤️ 不同年龄阶段主要死亡原因及比例分析</h1>
              <p className="text-slate-300 text-sm md:text-base">基于全球健康流行病学趋势的代表性数据（数据仅供趋势参考，总和为100%）</p>
            </div>

            <div className="flex border-b border-gray-200 bg-gray-50/50 flex-col md:flex-row">
              <button className={`flex-1 py-4 px-6 text-center font-medium transition-colors ${activeTab === 'overall' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`} onClick={() => setActiveTab('overall')}>死因结构演变 (堆叠柱状图)</button>
              <button className={`flex-1 py-4 px-6 text-center font-medium transition-colors ${activeTab === 'volume' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`} onClick={() => setActiveTab('volume')}>各年龄段死亡人数与概率 (双轴图)</button>
              <button className={`flex-1 py-4 px-6 text-center font-medium transition-colors ${activeTab === 'details' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`} onClick={() => setActiveTab('details')}>各年龄段深度剖析 (饼图及排行)</button>
            </div>

            <div className="p-6 md:p-8">
              {activeTab === 'overall' && <div className="space-y-6 flex flex-col items-center"><div className="text-center max-w-3xl mb-4"><p className="text-gray-600">此图表展示了随着年龄的增长，导致死亡的主要原因是如何发生演变的。可以清晰地看到从早期的<span className="font-semibold text-pink-500">先天疾病</span>和<span className="font-semibold text-orange-500">意外伤害</span>，逐渐过渡到中老年的<span className="font-semibold text-red-500">恶性肿瘤</span>和<span className="font-semibold text-blue-500">心血管疾病</span>。</p></div>
              <div className="w-full h-[500px]"><ResponsiveContainer width="100%" height="100%"><BarChart data={data} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}><CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" /><XAxis dataKey="ageGroup" axisLine={false} tickLine={false} tick={{fill: '#4b5563', fontSize: 14, fontWeight: 500}} dy={10} /><YAxis tickFormatter={(tick) => `${tick}%`} axisLine={false} tickLine={false} tick={{fill: '#6b7280'}} /><Tooltip formatter={(value, name) => [`${value}%`, name]} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} cursor={{fill: '#f3f4f6'}} /><Legend wrapperStyle={{ paddingTop: '20px' }} />{Object.keys(COLORS).map((key) => (<Bar key={key} dataKey={key} stackId="a" fill={COLORS[key]} maxBarSize={60} />))}</BarChart></ResponsiveContainer></div></div>}

              {activeTab === 'volume' && <div className="space-y-6 flex flex-col items-center"><div className="text-center max-w-3xl mb-4"><p className="text-gray-600">此图表展示了全球每年在不同年龄段的<span className="font-semibold text-indigo-600">绝对死亡人数</span>（柱状图，基于全球年度估算总量）以及该年龄段占总体死亡人口的<span className="font-semibold text-rose-500">死亡发生概率占比</span>（折线图）。</p></div>
              <div className="w-full h-[400px]"><ResponsiveContainer width="100%" height="100%"><ComposedChart data={data} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}><CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" /><XAxis dataKey="ageGroup" axisLine={false} tickLine={false} tick={{fill: '#4b5563', fontSize: 14, fontWeight: 500}} dy={10} /><YAxis yAxisId="left" tickFormatter={(tick) => `${tick}M`} axisLine={false} tickLine={false} tick={{fill: '#4f46e5'}} /><YAxis yAxisId="right" orientation="right" tickFormatter={(tick) => `${tick}%`} axisLine={false} tickLine={false} tick={{fill: '#e11d48'}} /><Tooltip contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} formatter={(value, name) => { if (name === '每年死亡人数 (百万)') return [`${value} 百万人`, name]; if (name === '占总死亡数比例') return [`${value}%`, name]; return [value, name]; }} /><Legend wrapperStyle={{ paddingTop: '20px' }} /><Bar yAxisId="left" dataKey="deaths" name="每年死亡人数 (百万)" fill="#818cf8" radius={[6, 6, 0, 0]} maxBarSize={60} /><Line yAxisId="right" type="monotone" dataKey="deathRatio" name="占总死亡数比例" stroke="#e11d48" strokeWidth={3} dot={{r: 6, fill: '#e11d48', strokeWidth: 2, stroke: '#fff'}} /></ComposedChart></ResponsiveContainer></div></div>}

              {activeTab === 'details' && <div className="flex flex-col lg:flex-row gap-8"><div className="w-full lg:w-1/4 flex flex-col gap-2"><h3 className="font-bold text-gray-700 mb-2 px-2">选择年龄段</h3>{data.map((d) => (<button key={d.ageGroup} onClick={() => { setSelectedAgeGroup(d.ageGroup); setPieActiveIndex(0); }} className={`text-left px-4 py-3 rounded-xl transition-all font-medium ${selectedAgeGroup === d.ageGroup ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600 hover:border-blue-300 hover:bg-blue-50'}`}>{d.ageGroup}</button>))}</div>
              <div className="w-full lg:w-3/4 bg-white border border-gray-100 rounded-2xl p-6 shadow-sm"><h2 className="text-2xl font-bold text-center text-gray-800 mb-6">{selectedAgeGroup} 主要死因分布</h2><div className="flex flex-col md:flex-row items-center justify-between"><div className="w-full md:w-1/2 h-[350px]"><ResponsiveContainer width="100%" height="100%"><PieChart><Pie activeIndex={pieActiveIndex} activeShape={renderActiveShape} data={pieChartData} cx="50%" cy="50%" innerRadius={80} outerRadius={110} dataKey="value" onMouseEnter={(_, index) => setPieActiveIndex(index)}>{pieChartData.map((entry, index) => (<Cell key={`cell-${index}`} fill={COLORS[entry.name]} />))}</Pie></PieChart></ResponsiveContainer></div><div className="w-full md:w-1/2 mt-8 md:mt-0"><h3 className="font-semibold text-gray-500 uppercase tracking-wider text-xs mb-3 pl-2">死因占比排行</h3><div className="space-y-3">{pieChartData.map((item, index) => (<div key={index} className="flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition-colors group"><div className="flex items-center gap-3"><div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-sm" style={{ backgroundColor: COLORS[item.name] }}>{index + 1}</div><div className="flex items-center gap-2"><span>{ICONS[item.name] || '📌'}</span><span className="font-medium text-gray-700 group-hover:text-gray-900">{item.name}</span></div></div><div className="font-bold text-lg" style={{ color: COLORS[item.name] }}>{item.value}%</div></div>))}</div></div></div></div></div>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
